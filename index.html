<script>

/* =========================
   THEME SYSTEM (FIXED)
========================= */
const toggleBtn = document.getElementById("themeToggle");
const icon = document.getElementById("theme-icon");

function applyTheme(theme) {
  if (theme === "light") {
    document.body.setAttribute("data-theme", "light");
    icon.className = "fas fa-moon";
  } else {
    document.body.removeAttribute("data-theme");
    icon.className = "fas fa-sun";
  }
}

toggleBtn.addEventListener("click", () => {
  const current = localStorage.getItem("theme") === "light" ? "dark" : "light";
  localStorage.setItem("theme", current);
  applyTheme(current);
});

/* =========================
   LOAD THEME
========================= */
document.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("theme") || "dark";
  applyTheme(saved);
  renderPortfolio();
});

/* =========================
   PORTFOLIO DATA
========================= */
const data = {
  about: `Cloud & Infrastructure Engineer with experience in AWS, Azure, Microsoft 365 and platform support. Skilled in incident resolution, RBAC, networking, and system reliability.`,

  experience: [
    {
      title: "Platform Support Engineer",
      company: "Manyathy Business Solutions",
      period: "Aug 2025 – Mar 2026",
      desc: "Handled Microsoft Power Platform + Azure infra, RBAC, incident resolution & monitoring. Improved resolution speed by 30%."
    },
    {
      title: "Backend Developer Intern",
      company: "Jain University",
      period: "2024 – 2025",
      desc: "Built backend for learning platform with authentication, tracking, and proctored exams."
    }
  ],

  projects: [

    "Jenkins", "CI/CD", "Terraform", "Python"
  ]
};

/* =========================
   RENDER FUNCTIONS
========================= */
function renderPortfolio() {
  const container = document.getElementById("portfolio");
  container.innerHTML = "";

  container.appendChild(section("About", `<p>${data.about}</p>`));

  container.appendChild(section("Experience",
    data.experience.map(e => `
      <div class="card">
        <h3>${e.title}</h3>
        <p><strong>${e.company}</strong> | ${e.period}</p>
        <p>${e.desc}</p>
      </div>
    `).join("")
  ));

  container.appendChild(section("Projects",
    data.projects.map(p => `
      <div class="card">
        <h3>${p.name} <a href="${p.link}" target="_blank"><i class="fab fa-github"></i></a></h3>
        <p>${p.desc}</p>
        <p><strong>${p.tech}</strong></p>
      </div>
    `).join("")
  ));

  container.appendChild(section("Skills",
    `<div class="skill-tags">
      ${data.skills.map(s => `<span class="skill-tag">${s}</span>`).join("")}
    </div>`
  ));
}

function section(title, content) {
  const sec = document.createElement("section");
  sec.className = "section";

  sec.innerHTML = `
    <h2>${title}</h2>
    <div class="card">${content}</div>
  `;
  return sec;
}

/* =========================
   CANVAS BACKGROUND (FIXED)
========================= */
const canvas = document.querySelector(".circuit-bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#00bcd4";
  ctx.globalAlpha = 0.3;

  for (let i = 0; i < 12; i++) {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;

    ctx.beginPath();
    ctx.moveTo(x, y);

    for (let j = 0; j < 5; j++) {
      x += Math.random() * 100 - 50;
      y += Math.random() * 100 - 50;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

setInterval(draw, 2000);

</script>
